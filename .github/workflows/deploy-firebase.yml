name: Deploy to Firebase Hosting

on:
  push:
    branches: [main, v2-astro, feature/chatbot-redesign-pot-99]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          channelId: ${{ github.ref_name == 'main' && 'live' || (github.ref_name == 'feature/chatbot-redesign-pot-99' && 'chatbot-preview' || 'staging') }}
          projectId: pottok-7b9ef
